{% extends "base.html" %}
{% block title %}Register — SugarNote{% endblock %}
{% block content %}
<div style="max-width:400px;margin:3rem auto;">
  <h1 style="font-family:'Playfair Display',serif;margin-bottom:1.5rem;">Create account</h1>
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required minlength="8">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
  </form>
  <p style="margin-top:1rem;font-size:.875rem;">
    Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent)">Sign in</a>
  </p>
</div>
{% endblock %}
```
