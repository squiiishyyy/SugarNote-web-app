{% extends "base.html" %}
{% block title %}Login — SugarNote{% endblock %}
{% block content %}
<div style="max-width:400px;margin:3rem auto;">
  <h1 style="font-family:'Playfair Display',serif;margin-bottom:1.5rem;">Sign in</h1>
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
  </form>
  <p style="margin-top:1rem;font-size:.875rem;">
    No account? <a href="{{ url_for('register') }}" style="color:var(--accent)">Sign up</a>
  </p>
</div>
{% endblock %}
